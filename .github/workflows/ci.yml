name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_discovery:
        description: Run one bounded live discovery and retain its report
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and quality tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Type-check
        run: mypy src tests

      - name: Test
        run: pytest

      - name: Smoke-test CLI
        run: |
          ukei --version
          ukei --database "${RUNNER_TEMP}/catalogue.sqlite3" init
          ukei --database "${RUNNER_TEMP}/catalogue.sqlite3" seed --dry-run
          ukei --database "${RUNNER_TEMP}/catalogue.sqlite3" seed
          ukei --database "${RUNNER_TEMP}/catalogue.sqlite3" status

  live-discovery:
    name: Bounded live discovery
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_discovery
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Discover bounded candidate set
        run: |
          mkdir -p discovery-output
          ukei --database "${RUNNER_TEMP}/discovery.sqlite3" discover \
            --provider all \
            --query environment \
            --limit 25 \
            --output discovery-output/discovery-report.json \
            --import-candidates
          ukei --database "${RUNNER_TEMP}/discovery.sqlite3" status \
            > discovery-output/catalogue-status.txt

      - name: Retain discovery report
        uses: actions/upload-artifact@v7
        with:
          name: ukei-discovery-report
          path: discovery-output/
          if-no-files-found: error
          retention-days: 14
