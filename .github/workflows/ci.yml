name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:
    inputs:
      run_live_discovery:
        description: Run one bounded live discovery and retain its report
        required: false
        default: false
        type: boolean
      run_live_validation:
        description: Discover and validate one bounded candidate set
        required: false
        default: false
        type: boolean
      run_resource_validation:
        description: Discover and validate underlying files and services
        required: false
        default: false
        type: boolean
      run_comprehensive_scan:
        description: Run the broad multi-theme discovery and validation scan (VVIP)
        required: false
        default: false
        type: boolean
      run_ai_enrichment:
        description: Run capped advisory OpenAI and Gemini classification after the scan
        required: false
        default: false
        type: boolean
      ai_max_records:
        description: Maximum catalogue records sent to each AI provider (1-500)
        required: false
        default: 50
        type: number

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and quality tools
        run: python -m pip install --upgrade pip && python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

      - name: Type-check
        run: mypy src tests

      - name: Test
        run: pytest

      - name: Smoke-test CLI
        run: |
          ukei --version
          ukei --database "${RUNNER_TEMP}/catalogue.sqlite3" init
          ukei --database "${RUNNER_TEMP}/catalogue.sqlite3" seed --dry-run
          ukei --database "${RUNNER_TEMP}/catalogue.sqlite3" seed
          ukei --database "${RUNNER_TEMP}/catalogue.sqlite3" validate --limit 2
          ukei --database "${RUNNER_TEMP}/catalogue.sqlite3" status

  live-discovery:
    name: Bounded live discovery
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_discovery
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Discover bounded candidate set
        run: |
          mkdir -p discovery-output
          ukei --database "${RUNNER_TEMP}/discovery.sqlite3" discover \
            --provider all \
            --query environment \
            --limit 25 \
            --output discovery-output/discovery-report.json \
            --import-candidates
          ukei --database "${RUNNER_TEMP}/discovery.sqlite3" status \
            > discovery-output/catalogue-status.txt

      - name: Retain discovery report
        uses: actions/upload-artifact@v7
        with:
          name: ukei-discovery-report
          path: discovery-output/
          if-no-files-found: error
          retention-days: 14

  live-validation:
    name: Bounded live validation
    if: github.event_name == 'workflow_dispatch' && inputs.run_live_validation
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      UKEI_HTTP_TIMEOUT_SECONDS: "10"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Discover bounded candidate set
        run: |
          mkdir -p validation-output
          ukei --database "${RUNNER_TEMP}/validation.sqlite3" discover \
            --provider all \
            --query environment \
            --limit 10 \
            --output validation-output/discovery-report.json \
            --import-candidates

      - name: Validate candidate metadata and URLs
        run: |
          ukei --database "${RUNNER_TEMP}/validation.sqlite3" validate \
            --live \
            --limit 20 \
            --report-only \
            --output validation-output/validation-report.json
          ukei --database "${RUNNER_TEMP}/validation.sqlite3" status \
            > validation-output/catalogue-status.txt

      - name: Retain validation evidence
        uses: actions/upload-artifact@v7
        with:
          name: ukei-validation-report
          path: validation-output/
          if-no-files-found: error
          retention-days: 14

  resource-validation:
    name: Bounded resource validation
    if: github.event_name == 'workflow_dispatch' && inputs.run_resource_validation
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      UKEI_HTTP_TIMEOUT_SECONDS: "10"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Discover bounded candidate and resource set
        run: |
          mkdir -p resource-output
          ukei --database "${RUNNER_TEMP}/resources.sqlite3" discover \
            --provider all \
            --query environment \
            --limit 5 \
            --output resource-output/discovery-report.json \
            --import-candidates

      - name: Validate landing pages and underlying resources
        run: |
          ukei --database "${RUNNER_TEMP}/resources.sqlite3" validate \
            --live \
            --resources \
            --limit 10 \
            --resource-limit 2 \
            --report-only \
            --output resource-output/resource-validation-report.json
          ukei --database "${RUNNER_TEMP}/resources.sqlite3" export \
            resource-output/catalogue-snapshot.json
          ukei --database "${RUNNER_TEMP}/resources.sqlite3" status \
            > resource-output/catalogue-status.txt

      - name: Retain resource evidence
        uses: actions/upload-artifact@v7
        with:
          name: ukei-resource-validation-report
          path: resource-output/
          if-no-files-found: error
          retention-days: 14

  comprehensive-discovery:
    name: Comprehensive discovery and shard plan
    if: github.event_name == 'workflow_dispatch' && inputs.run_comprehensive_scan
    needs: quality
    runs-on: ubuntu-latest
    timeout-minutes: 90
    outputs:
      matrix: ${{ steps.plan.outputs.matrix }}
    permissions:
      contents: read
    env:
      UKEI_HTTP_TIMEOUT_SECONDS: "12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .

      - name: Discover broad environmental candidate set
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p comprehensive-output/discovery
          ukei --database "${RUNNER_TEMP}/comprehensive.sqlite3" seed
          queries=(
            environment air water climate biodiversity habitat species ecology
            flood coast marine soil land waste pollution emissions forestry
            agriculture energy weather geology hydrology protected conservation
          )
          for query in "${queries[@]}"; do
            ukei --database "${RUNNER_TEMP}/comprehensive.sqlite3" discover \
              --provider all \
              --query "${query}" \
              --limit 1000 \
              --output "comprehensive-output/discovery/${query}.json" \
              --import-candidates
          done
          jq -s '{
            report_version: 1,
            query_reports: map({
              query,
              candidate_count,
              provider_counts,
              provider_coverage,
              duplicates_removed,
              errors
            }),
            query_count: length,
            total_query_candidates: (map(.candidate_count) | add),
            provider_errors: (map(.errors | length) | add)
          }' comprehensive-output/discovery/*.json \
            > comprehensive-output/coverage-ledger.json
          ukei --database "${RUNNER_TEMP}/comprehensive.sqlite3" export \
            comprehensive-output/discovered-catalogue.json
          cp "${RUNNER_TEMP}/comprehensive.sqlite3" \
            comprehensive-output/discovered-catalogue.sqlite3
          ukei --database "${RUNNER_TEMP}/comprehensive.sqlite3" status \
            > comprehensive-output/pre-validation-status.txt

      - name: Build validation shard matrix
        id: plan
        run: |
          ukei --database "${RUNNER_TEMP}/comprehensive.sqlite3" shard-plan --size 500 \
            > comprehensive-output/shard-matrix.json
          echo "matrix=$(tr -d '\n' < comprehensive-output/shard-matrix.json)" \
            >> "${GITHUB_OUTPUT}"

      - name: Retain discovery evidence
        uses: actions/upload-artifact@v7
        with:
          name: ukei-comprehensive-discovery
          path: comprehensive-output/
          if-no-files-found: error
          retention-days: 90

  comprehensive-validation:
    name: Validate shard ${{ matrix.index }}
    if: github.event_name == 'workflow_dispatch' && inputs.run_comprehensive_scan
    needs: comprehensive-discovery
    runs-on: ubuntu-latest
    # Some legacy geospatial services consume the full per-request timeout.
    # Preserve comprehensive checking while keeping each shard below GitHub's
    # six-hour hosted-job ceiling.
    timeout-minutes: 240
    strategy:
      fail-fast: false
      max-parallel: 12
      matrix: ${{ fromJSON(needs.comprehensive-discovery.outputs.matrix) }}
    env:
      UKEI_HTTP_TIMEOUT_SECONDS: "12"

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .
      - name: Download discovered catalogue
        uses: actions/download-artifact@v7
        with:
          name: ukei-comprehensive-discovery
          path: input
      - name: Validate assigned range
        run: |
          mkdir -p shard-output
          cp input/discovered-catalogue.sqlite3 "shard-output/shard-${{ matrix.index }}.sqlite3"
          ukei --database "shard-output/shard-${{ matrix.index }}.sqlite3" validate \
            --live --resources --resource-limit 1000 --report-only \
            --offset ${{ matrix.offset }} --limit ${{ matrix.limit }} \
            --output "shard-output/validation-report-${{ matrix.index }}.json"
          ukei --database "shard-output/shard-${{ matrix.index }}.sqlite3" status \
            > "shard-output/status-${{ matrix.index }}.txt"
      - name: Retain validation shard
        uses: actions/upload-artifact@v7
        with:
          name: ukei-validation-shard-${{ matrix.index }}
          path: shard-output/
          if-no-files-found: error
          retention-days: 30

  comprehensive-merge:
    name: Merge comprehensive evidence
    # Never merge or publish partial scientific evidence. A cancelled, timed
    # out, or failed shard must make this job skip until that shard succeeds.
    if: ${{ needs.comprehensive-discovery.result == 'success' && needs.comprehensive-validation.result == 'success' }}
    needs: [comprehensive-discovery, comprehensive-validation]
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package
        run: python -m pip install --upgrade pip && python -m pip install .
      - name: Download discovery evidence
        uses: actions/download-artifact@v7
        with:
          name: ukei-comprehensive-discovery
          path: discovery
      - name: Download all validation shards
        uses: actions/download-artifact@v7
        with:
          pattern: ukei-validation-shard-*
          path: shards
          merge-multiple: true
      - name: Merge, verify and export
        run: |
          mkdir -p comprehensive-output
          cp discovery/discovered-catalogue.sqlite3 comprehensive-output/validated-catalogue.sqlite3
          ukei --database comprehensive-output/validated-catalogue.sqlite3 merge-shards shards
          ukei --database comprehensive-output/validated-catalogue.sqlite3 merge-reports \
            shards comprehensive-output/comprehensive-validation-report.json
          ukei --database comprehensive-output/validated-catalogue.sqlite3 \
            summarize-validation comprehensive-output/comprehensive-validation-report.json \
            comprehensive-output/review
          ukei --database comprehensive-output/validated-catalogue.sqlite3 export \
            comprehensive-output/validated-catalogue.json
          gzip -9 comprehensive-output/validated-catalogue.json
          ukei --database comprehensive-output/validated-catalogue.sqlite3 status \
            > comprehensive-output/final-status.txt
          cp discovery/coverage-ledger.json comprehensive-output/coverage-ledger.json
      - name: Retain usable comprehensive catalogue
        uses: actions/upload-artifact@v7
        with:
          name: ukei-comprehensive-report
          path: |
            comprehensive-output/validated-catalogue.sqlite3
            comprehensive-output/validated-catalogue.json.gz
            comprehensive-output/final-status.txt
            comprehensive-output/coverage-ledger.json
            comprehensive-output/review/
          if-no-files-found: error
          retention-days: 90
      - name: Retain detailed validation evidence separately
        uses: actions/upload-artifact@v7
        with:
          name: ukei-detailed-validation-evidence
          path: comprehensive-output/comprehensive-validation-report.json
          if-no-files-found: error
          retention-days: 30

  intelligence:
    name: Optional ML and AI advisory analysis
    if: ${{ inputs.run_ai_enrichment && needs.comprehensive-merge.result == 'success' }}
    needs: comprehensive-merge
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install intelligence add-ons
        run: python -m pip install --upgrade pip && python -m pip install ".[intelligence]"
      - uses: actions/download-artifact@v7
        with:
          name: ukei-comprehensive-report
          path: input
      - name: Run local machine learning and capped AI classification
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: |
          mkdir -p intelligence-output
          gzip -dc input/validated-catalogue.json.gz > "${RUNNER_TEMP}/validated-catalogue.json"
          ukei ml "${RUNNER_TEMP}/validated-catalogue.json" intelligence-output/ml-report.json
          ukei enrich "${RUNNER_TEMP}/validated-catalogue.json" \
            intelligence-output/ai-advisory-report.json \
            --provider both --max-records ${{ inputs.ai_max_records }}
      - name: Retain advisory intelligence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ukei-intelligence-report
          path: intelligence-output/
          if-no-files-found: warn
          retention-days: 90
